<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__COMP_ID__</title>
<script src="./gsap.min.js"></script>
<style>
  :root { --bg:__BG__; --bg2:__BG_SECONDARY__; --text:__TEXT__; --primary:__PRIMARY__; --accent:__ACCENT__; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background: var(--bg); overflow:hidden;
    font-family:"Inter", system-ui, sans-serif; color: var(--text); }
  #root { width:1920px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(1200px 800px at 50% 50%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 65%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }
  .quote-marks {
    position:absolute; top: 110px; left: 130px;
    font-family: Georgia, serif; font-size: 280px; line-height: 0.7;
    color: var(--accent); opacity: 0.20;
  }
  .frame {
    position:absolute; inset: 200px 160px;
    display:flex; align-items:center; justify-content:center;
  }
  .quote {
    font-size: 84px; font-weight: 800; line-height: 1.15; letter-spacing: -0.012em;
    text-align:center; text-transform: uppercase;
    max-width: 1500px;
  }
  .word { display:inline-block; opacity: 0; transform: translateY(20px); padding: 0 8px; }
  .word.accent { color: var(--accent); }
  .word.primary { color: var(--primary); }
  .attr {
    position:absolute; bottom: 90px; left:0; right:0; text-align:center;
    font-size: 24px; letter-spacing: 0.36em; text-transform: uppercase;
    color: rgba(255,255,255,0.55); opacity: 0;
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="__COMP_ID__"
     data-start="0" data-width="1920" data-height="1080"
     data-duration="__DURATION__">
  <div class="quote-marks clip" id="qmark" data-start="0" data-duration="__DURATION__" data-track-index="0">"</div>
  <div class="frame">
    <div class="quote">
      __QUOTE_HTML__
    </div>
  </div>
  <div class="attr clip" id="attr" data-start="0" data-duration="__DURATION__" data-track-index="1">__ATTRIBUTION__</div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  const D = parseFloat(document.getElementById("root").getAttribute("data-duration")) || 4;
  gsap.set("#qmark", { opacity: 0, scale: 0.6, transformOrigin: "0% 0%" });
  gsap.set("#attr",  { opacity: 0 });
  const words = document.querySelectorAll(".quote .word");

  tl.to("#qmark", { opacity: 0.20, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 0);
  tl.to(words, { opacity: 1, y: 0, duration: 0.42, ease: "expo.out", stagger: 0.045 }, 0.2);
  tl.to("#attr", { opacity: 1, duration: 0.4, ease: "power2.out" }, "-=0.4");

  tl.to({}, { duration: Math.max(0.2, D - tl.duration() - 0.05) });
  window.__timelines["__COMP_ID__"] = tl;
</script>
</body>
</html>
