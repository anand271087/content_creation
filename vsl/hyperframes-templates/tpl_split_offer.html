<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__COMP_ID__</title>
<script src="./gsap.min.js"></script>
<style>
  :root { --bg:__BG__; --bg2:__BG_SECONDARY__; --text:__TEXT__; --primary:__PRIMARY__; --accent:__ACCENT__; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background: var(--bg); overflow:hidden;
    font-family:"Inter", system-ui, sans-serif; color: var(--text); }
  #root {
    width:1920px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(900px 700px at 75% 35%, color-mix(in srgb, var(--primary) 14%, transparent), transparent 60%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }
  /* LEFT HALF — reserved for avatar overlay at compose time. Kept dark so any 1-2 px
     edge gap blends with the avatar's recorded backdrop. */
  .left {
    position:absolute; left:0; top:0; width:960px; height:1080px;
    background: linear-gradient(180deg, #0a0a14 0%, #050509 100%);
  }
  /* Brand-blue vertical seam between halves */
  .seam {
    position:absolute; left:958px; top:0; width:4px; height:1080px;
    background: var(--primary); opacity: 0.85;
    box-shadow: 0 0 16px color-mix(in srgb, var(--primary) 60%, transparent);
  }
  /* RIGHT HALF — content panel */
  .right {
    position:absolute; left:960px; top:0; width:960px; height:1080px;
    padding: 72px 60px 72px 64px;
  }
  .pill {
    display:inline-block; font-size: 16px; font-weight: 800;
    letter-spacing: 0.36em; text-transform:uppercase;
    background: var(--accent); color: var(--bg);
    padding: 8px 16px; border-radius: 999px;
    opacity: 0;
  }
  .title {
    font-size: 72px; font-weight: 900; letter-spacing: -0.012em;
    text-transform: uppercase; margin-top: 18px;
    line-height: 1.04;
    opacity: 0;
  }
  .underbar {
    width: 92px; height: 6px; background: var(--primary);
    margin-top: 18px; opacity: 0; transform-origin: left center;
  }
  .items {
    margin-top: 44px;
    display:flex; flex-direction:column; gap: 18px;
  }
  .item {
    display:flex; align-items:center; gap: 22px;
    padding: 22px 24px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.10);
    border-left: 5px solid var(--primary);
    border-radius: 16px;
    opacity: 0;
  }
  .item .n {
    flex: 0 0 auto;
    width: 56px; height: 56px; border-radius: 14px;
    display:flex; align-items:center; justify-content:center;
    font-size: 22px; font-weight: 900;
    background: color-mix(in srgb, var(--primary) 18%, transparent);
    border: 2px solid color-mix(in srgb, var(--primary) 65%, transparent);
    color: var(--primary);
  }
  .item .lbl {
    font-size: 28px; font-weight: 800; letter-spacing: -0.005em;
    color: rgba(255,255,255,0.95);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="__COMP_ID__"
     data-start="0" data-width="1920" data-height="1080"
     data-duration="__DURATION__">
  <div class="left"></div>
  <div class="seam"></div>
  <div class="right">
    <div class="clip pill"  id="pill"     data-start="0" data-duration="__DURATION__" data-track-index="0">ZEROHANDS</div>
    <div class="clip title" id="title"    data-start="0" data-duration="__DURATION__" data-track-index="1">__TITLE__</div>
    <div class="clip underbar" id="bar"   data-start="0" data-duration="__DURATION__" data-track-index="2"></div>
    <div class="items">
      __ITEMS_HTML__
    </div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  const D = parseFloat(document.getElementById("root").getAttribute("data-duration")) || 30;
  gsap.set("#pill",  { opacity: 0, y: -8 });
  gsap.set("#title", { opacity: 0, y: -8 });
  gsap.set("#bar",   { opacity: 0, scaleX: 0 });
  gsap.set(".item",  { opacity: 0, x: 36 });

  tl.to("#pill",  { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 0);
  tl.to("#title", { opacity: 1, y: 0, duration: 0.5,  ease: "expo.out"   }, 0.15);
  tl.to("#bar",   { opacity: 1, scaleX: 1, duration: 0.45, ease: "power3.out" }, 0.35);
  // Items stagger over a portion of total duration so they sync with avatar narration.
  const items = document.querySelectorAll(".item");
  const itemSpan = Math.max(2, D * 0.7);   // items reveal across 70% of the segment
  const itemStart = 0.6;
  const stagger = items.length > 1 ? itemSpan / items.length : 0.4;
  items.forEach((it, i) => {
    tl.to(it, { opacity: 1, x: 0, duration: 0.55, ease: "back.out(1.3)" },
          itemStart + i * stagger);
  });
  tl.to({}, { duration: Math.max(0.2, D - tl.duration() - 0.05) });
  window.__timelines["__COMP_ID__"] = tl;
</script>
</body>
</html>
