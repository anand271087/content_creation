<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__COMP_ID__</title>
<script src="./gsap.min.js"></script>
<style>
  :root {
    --bg:           __BG__;
    --bg2:          __BG_SECONDARY__;
    --text:         __TEXT__;
    --primary:      __PRIMARY__;
    --accent:       __ACCENT__;
    --muted:        rgba(255,255,255,0.42);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background: var(--bg); overflow:hidden;
    font-family: "Inter", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    font-feature-settings: "ss01","cv01","cv11";
    color: var(--text); }
  #root {
    width:1920px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(1200px 800px at 30% 35%, color-mix(in srgb, var(--primary) 12%, transparent), transparent 60%),
      radial-gradient(900px 700px at 85% 80%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 65%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: radial-gradient(1500px 1000px at 50% 50%, #000 30%, transparent 80%);
  }
  .stack {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 0 120px; gap: 22px;
  }
  .eyebrow {
    font-size: 22px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
  }
  .line {
    font-size: 138px; font-weight: 900; line-height: 1.02; letter-spacing: -0.018em;
    text-align: center; text-transform: uppercase;
    opacity: 0;
    transform-origin: 50% 60%;
  }
  .line.accent { color: var(--primary); }
  .underbar {
    width: 160px; height: 8px; background: var(--accent);
    margin-top: 28px; opacity: 0; transform-origin: left center;
  }
  .badge-tr {
    position:absolute; top:48px; right:64px;
    font-size:14px; letter-spacing:0.32em; text-transform:uppercase;
    color: var(--muted);
    display:flex; align-items:center; gap:10px;
  }
  .badge-tr .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="__COMP_ID__"
     data-start="0"
     data-width="1920"
     data-height="1080"
     data-duration="__DURATION__">
  <div class="grid"></div>
  <div class="badge-tr"><span class="dot"></span><span>ZEROHANDS</span></div>
  <div class="stack">
    <div class="clip eyebrow" id="eyebrow" data-start="0" data-duration="__DURATION__" data-track-index="0">__EYEBROW__</div>
    <div class="clip line" id="l1" data-start="0" data-duration="__DURATION__" data-track-index="1">__LINE1__</div>
    <div class="clip line accent" id="l2" data-start="0" data-duration="__DURATION__" data-track-index="2">__LINE2__</div>
    <div class="clip line" id="l3" data-start="0" data-duration="__DURATION__" data-track-index="3">__LINE3__</div>
    <div class="clip underbar" id="bar" data-start="0" data-duration="__DURATION__" data-track-index="4"></div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  const D = parseFloat(document.getElementById("root").getAttribute("data-duration")) || 4;

  // initial state
  gsap.set("#eyebrow", { opacity: 0, y: -10 });
  gsap.set(["#l1","#l2","#l3"], { opacity: 0, y: 40, scale: 1.06 });
  gsap.set("#bar", { opacity: 0, scaleX: 0 });

  // sequence
  tl.to("#eyebrow", { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 0.05);
  tl.to("#l1",      { opacity: 1, y: 0, scale: 1, duration: 0.5,  ease: "expo.out" }, 0.18);
  tl.to("#l2",      { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "expo.out" }, 0.42);
  tl.to("#l3",      { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "expo.out" }, 0.66);
  tl.to("#bar",     { opacity: 1, scaleX: 1, duration: 0.5, ease: "power3.out" }, 0.95);

  // hold the final state for the remainder of the duration so nothing fades out mid-clip
  tl.to({}, { duration: Math.max(0.2, D - tl.duration() - 0.05) });

  window.__timelines["__COMP_ID__"] = tl;
</script>
</body>
</html>
