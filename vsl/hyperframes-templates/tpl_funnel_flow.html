<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__COMP_ID__</title>
<script src="./gsap.min.js"></script>
<style>
  :root { --bg:__BG__; --bg2:__BG_SECONDARY__; --text:__TEXT__; --primary:__PRIMARY__; --accent:__ACCENT__; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background: var(--bg); overflow:hidden;
    font-family:"Inter", system-ui, sans-serif; color: var(--text); }
  #root { width:1920px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(900px 700px at 50% 30%, color-mix(in srgb, var(--primary) 10%, transparent), transparent 60%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }
  .header { position:absolute; top: 100px; left: 0; right:0; text-align:center; }
  .pill { display:inline-block; font-size: 18px; font-weight: 800;
          letter-spacing: 0.36em; text-transform:uppercase;
          background: var(--accent); color: var(--bg);
          padding: 9px 18px; border-radius: 999px; opacity:0; }
  .title { font-size: 88px; font-weight: 900; letter-spacing: -0.012em;
           text-transform: uppercase; margin-top: 20px; opacity:0; }
  .row { position:absolute; left: 60px; right: 60px; top: 430px;
         /* Reserve right 380px (PIP zone) — `padding-right` keeps the flex row
            from extending into the bottom-right corner where the avatar PIP sits. */
         padding-right: 380px;
         display:flex; align-items: stretch; justify-content: flex-start; gap: 18px; }
  .node {
    flex: 1 1 0; max-width: 320px; min-width: 230px;
    padding: 26px 20px; text-align:center;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    opacity: 0; position:relative;
  }
  .node.last {
    background: color-mix(in srgb, var(--primary) 22%, transparent);
    border-color: color-mix(in srgb, var(--primary) 70%, transparent);
    box-shadow: 0 0 50px color-mix(in srgb, var(--primary) 45%, transparent);
  }
  .node .step-id {
    font-size: 16px; letter-spacing: 0.36em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px;
  }
  .node .lbl { font-size: 42px; font-weight: 900; letter-spacing: -0.01em;
               text-transform: uppercase; color: var(--text); }
  .node .sub  { font-size: 20px; color: rgba(255,255,255,0.62); margin-top: 8px; }
  .arrow {
    display:flex; align-items:center; justify-content:center;
    width: 56px; flex: 0 0 auto; color: var(--primary); opacity:0;
  }
  .arrow svg { width: 56px; height: 56px; }
  .ribbon {
    position:absolute; bottom: 130px; left: 0; right: 0; text-align:center;
    font-size: 28px; font-weight: 800; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--accent); opacity: 0;
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="__COMP_ID__"
     data-start="0" data-width="1920" data-height="1080"
     data-duration="__DURATION__">
  <div class="header">
    <div class="clip pill"  id="pill"  data-start="0" data-duration="__DURATION__" data-track-index="0">__PILL__</div>
    <div class="clip title" id="title" data-start="0" data-duration="__DURATION__" data-track-index="1">__TITLE__</div>
  </div>
  <div class="row">
    __NODES_HTML__
  </div>
  <div class="clip ribbon" id="ribbon" data-start="0" data-duration="__DURATION__" data-track-index="98">__RIBBON__</div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  const D = parseFloat(document.getElementById("root").getAttribute("data-duration")) || 14;
  gsap.set("#pill",   { opacity: 0, y: -8 });
  gsap.set("#title",  { opacity: 0, y: -10 });
  gsap.set(".node",   { opacity: 0, y: 24, scale: 0.95 });
  gsap.set(".arrow",  { opacity: 0, x: -10 });
  gsap.set("#ribbon", { opacity: 0, y: 8 });

  tl.to("#pill",  { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0);
  tl.to("#title", { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 0.12);

  const nodes = document.querySelectorAll(".node");
  const arrows = document.querySelectorAll(".arrow");
  nodes.forEach((n, i) => {
    tl.to(n, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.4)" }, 0.6 + i * 0.5);
    if (i < arrows.length) {
      tl.to(arrows[i], { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, 0.8 + i * 0.5);
    }
  });
  tl.to("#ribbon", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, "+=0.1");
  tl.to({}, { duration: Math.max(0.2, D - tl.duration() - 0.05) });
  window.__timelines["__COMP_ID__"] = tl;
</script>
</body>
</html>
