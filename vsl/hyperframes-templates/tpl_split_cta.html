<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__COMP_ID__</title>
<script src="./gsap.min.js"></script>
<style>
  :root { --bg:__BG__; --bg2:__BG_SECONDARY__; --text:__TEXT__; --primary:__PRIMARY__; --accent:__ACCENT__; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background: var(--bg); overflow:hidden;
    font-family:"Inter", system-ui, sans-serif; color: var(--text); }
  #root {
    width:1920px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(900px 700px at 78% 55%, color-mix(in srgb, var(--primary) 16%, transparent), transparent 60%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }
  .left {
    position:absolute; left:0; top:0; width:960px; height:1080px;
    background: linear-gradient(180deg, #0a0a14 0%, #050509 100%);
  }
  .seam {
    position:absolute; left:958px; top:0; width:4px; height:1080px;
    background: var(--primary); opacity: 0.85;
    box-shadow: 0 0 16px color-mix(in srgb, var(--primary) 60%, transparent);
  }
  .right {
    position:absolute; left:960px; top:0; width:960px; height:1080px;
    padding: 96px 60px;
    display:flex; flex-direction:column; justify-content:center;
  }
  .pill {
    display:inline-block; font-size: 18px; font-weight: 800;
    letter-spacing: 0.36em; text-transform:uppercase;
    background: var(--accent); color: var(--bg);
    padding: 10px 20px; border-radius: 999px;
    opacity: 0; align-self: flex-start;
  }
  .headline {
    font-size: 132px; font-weight: 900; letter-spacing: -0.015em;
    line-height: 0.96; text-transform: uppercase;
    margin-top: 28px;
    opacity: 0;
  }
  .headline .accent { color: var(--primary); display: block; }
  .underbar {
    width: 132px; height: 8px; background: var(--accent);
    margin-top: 28px; opacity: 0; transform-origin: left center;
  }
  .meta {
    margin-top: 64px;
    display:flex; flex-direction:column; gap: 20px;
  }
  .meta-row {
    display:flex; align-items:center; gap: 22px;
    font-size: 30px; font-weight: 700;
    color: rgba(255,255,255,0.92);
    opacity: 0;
  }
  .meta-row .icon {
    width: 64px; height: 64px; border-radius: 14px;
    display:flex; align-items:center; justify-content:center;
    font-size: 30px;
    background: color-mix(in srgb, var(--primary) 22%, transparent);
    border: 2px solid color-mix(in srgb, var(--primary) 65%, transparent);
    color: var(--primary);
  }
  .cta-btn {
    margin-top: 56px;
    display:inline-flex; align-items:center; gap: 16px;
    align-self: flex-start;
    padding: 26px 40px; border-radius: 18px;
    background: var(--primary);
    color: #fff;
    font-size: 36px; font-weight: 900; letter-spacing: 0.02em;
    text-transform: uppercase;
    box-shadow: 0 20px 60px -22px var(--primary);
    opacity: 0;
  }
  .cta-btn .arrow {
    display:inline-block; font-size: 40px;
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="__COMP_ID__"
     data-start="0" data-width="1920" data-height="1080"
     data-duration="__DURATION__">
  <div class="left"></div>
  <div class="seam"></div>
  <div class="right">
    <div class="clip pill" id="pill" data-start="0" data-duration="__DURATION__" data-track-index="0">NEXT STEP</div>
    <div class="clip headline" id="headline" data-start="0" data-duration="__DURATION__" data-track-index="1">
      BOOK<br><span class="accent">A CALL.</span>
    </div>
    <div class="clip underbar" id="bar" data-start="0" data-duration="__DURATION__" data-track-index="2"></div>
    <div class="meta">
      <div class="clip meta-row" id="m1" data-start="0" data-duration="__DURATION__" data-track-index="3">
        <div class="icon">⌚</div><div>30-MINUTE CALL</div>
      </div>
      <div class="clip meta-row" id="m2" data-start="0" data-duration="__DURATION__" data-track-index="4">
        <div class="icon">✓</div><div>NO PRESSURE · ZERO PITCH</div>
      </div>
      <div class="clip meta-row" id="m3" data-start="0" data-duration="__DURATION__" data-track-index="5">
        <div class="icon">→</div><div>@AUTOMATEWITHANAND</div>
      </div>
    </div>
    <div class="clip cta-btn" id="cta" data-start="0" data-duration="__DURATION__" data-track-index="6">
      <span>LINK BELOW</span><span class="arrow">→</span>
    </div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  const D = parseFloat(document.getElementById("root").getAttribute("data-duration")) || 30;
  gsap.set("#pill",     { opacity: 0, y: -8 });
  gsap.set("#headline", { opacity: 0, y: -12, scale: 1.04 });
  gsap.set("#bar",      { opacity: 0, scaleX: 0 });
  gsap.set(".meta-row", { opacity: 0, x: 24 });
  gsap.set("#cta",      { opacity: 0, y: 16, scale: 0.96 });

  tl.to("#pill",     { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 0);
  tl.to("#headline", { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" }, 0.18);
  tl.to("#bar",      { opacity: 1, scaleX: 1, duration: 0.45, ease: "power3.out" }, 0.55);
  tl.to("#m1",       { opacity: 1, x: 0, duration: 0.5, ease: "back.out(1.3)" }, 0.9);
  tl.to("#m2",       { opacity: 1, x: 0, duration: 0.5, ease: "back.out(1.3)" }, 1.25);
  tl.to("#m3",       { opacity: 1, x: 0, duration: 0.5, ease: "back.out(1.3)" }, 1.6);
  tl.to("#cta",      { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.6)" }, 2.0);
  tl.to({}, { duration: Math.max(0.2, D - tl.duration() - 0.05) });
  window.__timelines["__COMP_ID__"] = tl;
</script>
</body>
</html>
