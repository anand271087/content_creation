<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=520" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* Magenta = chroma-key transparency at composite time (core/motion.py) */
      html, body { width: 720px; height: 520px; overflow: hidden; background: #FF00FF; }
      #root {
        position: relative; width: 720px; height: 520px;
        display: flex; align-items: center; justify-content: center;
      }
      #card {
        display: flex; flex-direction: column; align-items: center; gap: 26px;
        background: __CARD_BG__;
        border-radius: 30px;
        padding: 46px 60px;
        opacity: 0;
        box-shadow: 0 18px 44px rgba(0,0,0,0.5);
        filter: blur(14px);
      }
      #logo { width: 170px; height: 170px; object-fit: contain; }
      #name {
        font-family: 'Montserrat', sans-serif;
        font-size: 40px; font-weight: 900;
        text-transform: uppercase; letter-spacing: 1px;
        color: __TEXT_COLOR__;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__DURATION__"
      data-width="720"
      data-height="520"
    >
      <div id="card">
        <img id="logo" src="__LOGO__" />
        <div id="name">__NAME__</div>
      </div>
    </div>
    <script>
      const D = parseFloat(document.getElementById("root").dataset.duration);
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // motion-blur pop: blurred + oversized -> snaps sharp (the Dan Martell card pop)
      tl.fromTo("#card",
          { opacity: 0, scale: 1.38, filter: "blur(14px)" },
          { opacity: 1, scale: 1.0, filter: "blur(0px)", duration: 0.34, ease: "power3.out" }, 0)
        .to("#card", { scale: 1.02, duration: 0.14, ease: "power1.inOut" }, 0.34)
        .to("#card", { scale: 1.0, duration: 0.16, ease: "power2.out" }, 0.48)
        // pad to full composition duration (renderer requirement)
        .to("#root", { opacity: 1, duration: Math.max(0.01, D - 0.64) }, 0.64);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
