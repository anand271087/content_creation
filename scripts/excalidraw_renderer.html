<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; width: 1080px; min-height: 880px; overflow: hidden; }
    #root { width: 1080px; height: 880px; }
    .excalidraw { width: 1080px !important; height: 880px !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
  <script>
    window.renderDone = false;
    window.renderError = null;

    window.renderDiagram = async function(excalidrawJson) {
      try {
        const { exportToBlob } = window.ExcalidrawLib;
        const elements = excalidrawJson.elements || [];
        const appState = {
          ...(excalidrawJson.appState || {}),
          viewBackgroundColor: "#ffffff",
          exportWithDarkMode: false,
        };
        const blob = await exportToBlob({
          elements,
          appState,
          files: excalidrawJson.files || {},
          exportPadding: 48,
          maxWidthOrHeight: 1080,
          quality: 1,
          type: "image/png",
        });
        const arrayBuffer = await blob.arrayBuffer();
        const uint8 = new Uint8Array(arrayBuffer);
        window._pngBytes = Array.from(uint8);
        window.renderDone = true;
      } catch(e) {
        window.renderError = e.toString();
        window.renderDone = true;
      }
    };
  </script>
</body>
</html>
