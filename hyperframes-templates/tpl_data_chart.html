<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #0a0a0f; font-family: 'Montserrat', sans-serif; }

  .root {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 60px;
  }

  .chart-title {
    font-size: 52px;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    margin-bottom: 80px;
    line-height: 1.2;
    letter-spacing: -1px;
  }

  .chart-title span {
    color: #FFD700;
  }

  .bars-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  .bar-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bar-label {
    font-size: 36px;
    font-weight: 700;
    color: #cccccc;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .bar-track {
    width: 100%;
    height: 64px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 8px;
    transform-origin: left center;
    scaleX: 0;
  }

  .bar-fill.primary {
    background: linear-gradient(90deg, #FFD700, #FF6B00);
  }

  .bar-fill.secondary {
    background: linear-gradient(90deg, #3B82F6, #6366F1);
  }

  .bar-fill.accent {
    background: linear-gradient(90deg, #10B981, #059669);
  }

  .bar-value {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    font-weight: 900;
    color: #ffffff;
  }

  .chart-footer {
    margin-top: 80px;
    font-size: 32px;
    font-weight: 600;
    color: #888888;
    text-align: center;
  }

  .shimmer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
    background-size: 200% 100%;
    pointer-events: none;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<div
  id="root"
  class="root clip"
  data-composition-id="data-chart"
  data-start="0"
  data-width="1080"
  data-height="1920"
  data-duration="__DURATION__"
  data-track-index="0"
>
  <div class="shimmer"></div>

  <div class="chart-title" id="chartTitle">__CHART_TITLE__</div>

  <div class="bars-container" id="barsContainer">
    <!-- Bars injected by generator -->
    __BARS_HTML__
  </div>

  <div class="chart-footer" id="chartFooter">__CHART_FOOTER__</div>
</div>

<script>
(function () {
  window.__timelines = window.__timelines || {};
  var tl = gsap.timeline({ paused: true });

  var fills = document.querySelectorAll('.bar-fill');
  var widths = [];
  fills.forEach(function (el) {
    widths.push(el.getAttribute('data-width-pct') || '80');
  });

  // Title
  tl.from('#chartTitle', { opacity: 0, y: -40, duration: 0.5, ease: 'power2.out' }, 0);

  // Bars stagger in
  fills.forEach(function (fill, i) {
    var row = fill.closest('.bar-row');
    tl.from(row.querySelector('.bar-label'), { opacity: 0, x: -30, duration: 0.35, ease: 'power2.out' }, 0.4 + i * 0.15);
    tl.fromTo(fill,
      { scaleX: 0 },
      { scaleX: parseFloat(widths[i]) / 100, duration: 0.7, ease: 'power4.out', transformOrigin: 'left center' },
      0.55 + i * 0.15
    );
    var valueEl = fill.parentElement.querySelector('.bar-value');
    if (valueEl) {
      tl.from(valueEl, { opacity: 0, duration: 0.25, ease: 'power2.out' }, 0.9 + i * 0.15);
    }
  });

  // Footer
  tl.from('#chartFooter', { opacity: 0, y: 20, duration: 0.4, ease: 'sine.inOut' }, '+=0.2');

  // Shimmer sweep
  tl.to('.shimmer', { backgroundPositionX: '-200%', duration: 1.2, ease: 'sine.inOut', repeat: -1, repeatDelay: 2 }, 1.5);

  window.__timelines['data-chart'] = tl;
})();
</script>
</body>
</html>
