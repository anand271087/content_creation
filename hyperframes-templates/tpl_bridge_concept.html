<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=880, height=1100" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@600&display=swap" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 880px; height: 1100px;
        overflow: hidden;
        background: #080c18;
      }
      #root {
        position: relative;
        width: 880px; height: 1100px;
        display: flex; align-items: center; justify-content: center;
      }
      svg#shapes {
        position: absolute;
        top: 0; left: 0;
        width: 880px; height: 1100px;
      }
      #center-text {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 0 80px;
      }
      #bridge-label {
        font-family: 'Inter', sans-serif;
        font-size: 16px; font-weight: 600;
        letter-spacing: 5px; text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        margin-bottom: 20px;
        opacity: 0;
      }
      #bridge-line {
        font-family: 'Montserrat', sans-serif;
        font-size: 44px; font-weight: 700;
        color: #ffffff;
        line-height: 1.3;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__DURATION__"
      data-width="880"
      data-height="1100"
    >
      <svg id="shapes" viewBox="0 0 880 1100" xmlns="http://www.w3.org/2000/svg">
        <!-- Floating circles -->
        <circle id="c1" cx="180" cy="250" r="120" fill="none" stroke="rgba(100,150,255,0.12)" stroke-width="1.5" />
        <circle id="c2" cx="700" cy="880" r="160" fill="none" stroke="rgba(100,150,255,0.08)" stroke-width="1" />
        <circle id="c3" cx="760" cy="280" r="80" fill="none" stroke="rgba(255,180,50,0.1)" stroke-width="1.5" />
        <circle id="c4" cx="140" cy="820" r="60" fill="none" stroke="rgba(255,180,50,0.08)" stroke-width="1" />
        <!-- Diagonal lines -->
        <line id="l1" x1="0" y1="400" x2="880" y2="700" stroke="rgba(100,150,255,0.07)" stroke-width="1" />
        <line id="l2" x1="0" y1="600" x2="880" y2="300" stroke="rgba(100,150,255,0.05)" stroke-width="1" />
        <!-- Dots -->
        <circle id="d1" cx="440" cy="200" r="4" fill="rgba(255,180,50,0.5)" />
        <circle id="d2" cx="200" cy="550" r="3" fill="rgba(100,150,255,0.4)" />
        <circle id="d3" cx="680" cy="550" r="3" fill="rgba(100,150,255,0.4)" />
        <circle id="d4" cx="440" cy="900" r="4" fill="rgba(255,180,50,0.3)" />
        <!-- Center glow -->
        <radialGradient id="grd" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(100,150,255,0.06)" />
          <stop offset="100%" stop-color="transparent" />
        </radialGradient>
        <rect x="0" y="0" width="880" height="1100" fill="url(#grd)" />
      </svg>

      <div id="center-text">
        <div id="bridge-label">but here's the thing</div>
        <div id="bridge-line"></div>
      </div>
    </div>

    <script>
      window.__SECTION_DATA__ = __SECTION_DATA_PLACEHOLDER__;

      const d = window.__SECTION_DATA__;
      const lines = d.on_screen_text || [];
      document.getElementById("bridge-line").textContent = lines[0] || d.spoken.split(".")[0];

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Circles drift slowly
      tl.to("#c1", { attr: { cx: 200, cy: 230 }, duration: 5, ease: "sine.inOut" }, 0)
        .to("#c2", { attr: { cx: 680, cy: 900 }, duration: 6, ease: "sine.inOut" }, 0)
        .to("#c3", { attr: { cx: 740, cy: 260 }, duration: 4, ease: "sine.inOut" }, 0)
        .to("#d1", { attr: { cy: 180 }, duration: 4, ease: "sine.inOut" }, 0)
        .to("#d4", { attr: { cy: 920 }, duration: 5, ease: "sine.inOut" }, 0)
        // Text fades in
        .to("#bridge-label", { opacity: 1, duration: 0.7, ease: "power2.out" }, 0.5)
        .fromTo("#bridge-line",
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.7, ease: "power2.out" },
          1.0
        );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
