<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #08090f; font-family: 'Montserrat', sans-serif; }

  .root {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
  }

  .flow-title {
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    margin-bottom: 100px;
    letter-spacing: -1px;
    line-height: 1.2;
    opacity: 0;
  }

  .flow-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .flow-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
    transform: translateY(30px);
  }

  .step-number {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    color: rgba(255,255,255,0.6);
  }

  .step-box {
    width: 250px;
    min-height: 180px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .step-box.s1 {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid rgba(99,102,241,0.5);
    box-shadow: 0 0 40px rgba(99,102,241,0.2);
  }
  .step-box.s2 {
    background: linear-gradient(135deg, #0f2027, #203a43);
    border: 2px solid rgba(59,130,246,0.5);
    box-shadow: 0 0 40px rgba(59,130,246,0.2);
  }
  .step-box.s3 {
    background: linear-gradient(135deg, #1a2a1a, #203a20);
    border: 2px solid rgba(16,185,129,0.5);
    box-shadow: 0 0 40px rgba(16,185,129,0.2);
  }

  .step-icon {
    font-size: 52px;
    margin-bottom: 16px;
  }

  .step-label {
    font-size: 30px;
    font-weight: 900;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  .step-sub {
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-top: 10px;
    line-height: 1.3;
  }

  .arrow-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 80px;
    opacity: 0;
    flex-shrink: 0;
  }

  .arrow-line {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.7));
    border-radius: 2px;
    transform-origin: left center;
    scaleX: 0;
  }

  .arrow-head {
    width: 0;
    height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 18px solid rgba(255,255,255,0.7);
    margin-left: -4px;
  }

  .result-bar {
    margin-top: 100px;
    background: linear-gradient(90deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 32px 48px;
    text-align: center;
    width: 100%;
    opacity: 0;
  }

  .result-label {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .result-value {
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
  }

  .result-value span {
    color: #10B981;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<div
  id="root"
  class="root clip"
  data-composition-id="flowchart-h"
  data-start="0"
  data-width="1080"
  data-height="1920"
  data-duration="__DURATION__"
  data-track-index="0"
>
  <div class="flow-title" id="flowTitle">__FLOW_TITLE__</div>

  <div class="flow-row">
    <!-- Step 1 -->
    <div class="flow-step" id="step1">
      <div class="step-number">1</div>
      <div class="step-box s1">
        <div class="step-icon">__ICON_1__</div>
        <div class="step-label">__STEP_1__</div>
        <div class="step-sub">__SUB_1__</div>
      </div>
    </div>

    <!-- Arrow 1 -->
    <div class="arrow-connector" id="arrow1">
      <div style="display:flex;align-items:center;">
        <div class="arrow-line" id="line1"></div>
        <div class="arrow-head"></div>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="flow-step" id="step2">
      <div class="step-number">2</div>
      <div class="step-box s2">
        <div class="step-icon">__ICON_2__</div>
        <div class="step-label">__STEP_2__</div>
        <div class="step-sub">__SUB_2__</div>
      </div>
    </div>

    <!-- Arrow 2 -->
    <div class="arrow-connector" id="arrow2">
      <div style="display:flex;align-items:center;">
        <div class="arrow-line" id="line2"></div>
        <div class="arrow-head"></div>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="flow-step" id="step3">
      <div class="step-number">3</div>
      <div class="step-box s3">
        <div class="step-icon">__ICON_3__</div>
        <div class="step-label">__STEP_3__</div>
        <div class="step-sub">__SUB_3__</div>
      </div>
    </div>
  </div>

  <!-- Result bar -->
  <div class="result-bar" id="resultBar">
    <div class="result-label">Result</div>
    <div class="result-value">__RESULT__</div>
  </div>
</div>

<script>
(function () {
  window.__timelines = window.__timelines || {};
  var tl = gsap.timeline({ paused: true });

  // Title
  tl.to('#flowTitle', { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 0);

  // Step 1
  tl.to('#step1', { opacity: 1, y: 0, duration: 0.45, ease: 'power4.out' }, 0.3);

  // Arrow 1
  tl.to('#arrow1', { opacity: 1, duration: 0.1 }, 0.65);
  tl.fromTo('#line1', { scaleX: 0 }, { scaleX: 1, duration: 0.3, ease: 'power2.out', transformOrigin: 'left center' }, 0.65);

  // Step 2
  tl.to('#step2', { opacity: 1, y: 0, duration: 0.45, ease: 'power4.out' }, 0.85);

  // Arrow 2
  tl.to('#arrow2', { opacity: 1, duration: 0.1 }, 1.2);
  tl.fromTo('#line2', { scaleX: 0 }, { scaleX: 1, duration: 0.3, ease: 'power2.out', transformOrigin: 'left center' }, 1.2);

  // Step 3
  tl.to('#step3', { opacity: 1, y: 0, duration: 0.45, ease: 'power4.out' }, 1.4);

  // Result bar
  tl.to('#resultBar', { opacity: 1, duration: 0.5, ease: 'sine.inOut' }, 2.0);

  // Glow pulse on step boxes
  tl.to('.step-box.s3', {
    boxShadow: '0 0 80px rgba(16,185,129,0.45)',
    duration: 0.6,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1
  }, 2.2);

  window.__timelines['flowchart-h'] = tl;
})();
</script>
</body>
</html>
