<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=880, height=1100" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 880px; height: 1100px;
        overflow: hidden;
        background: #0d1117;
      }
      #root {
        width: 880px; height: 1100px;
        display: flex; flex-direction: column;
        justify-content: center;
        padding: 60px 60px;
      }
      /* Items are ALWAYS visible — no opacity:0 in CSS, no display:none */
      .item {
        display: flex; align-items: center;
        margin-bottom: 36px;
        opacity: 1;
      }
      .num-circle {
        flex-shrink: 0;
        width: 80px; height: 80px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-size: 42px; font-weight: 900;
        margin-right: 28px;
      }
      .item-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 34px; font-weight: 700;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__DURATION__"
      data-width="880"
      data-height="1100"
    >
      <!-- Items injected as STATIC HTML by generate_hyperframes_broll.mjs
           so they exist before any JS runs — no blank screen possible -->
      __ITEMS_HTML_PLACEHOLDER__
    </div>

    <script>
      window.__SECTION_DATA__ = __SECTION_DATA_PLACEHOLDER__;

      const d = window.__SECTION_DATA__;
      const duration = d.duration_sec || 8;
      const itemCount = (d.card_lines && d.card_lines.length ? d.card_lines : d.on_screen_text || []).length;

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Slide items in from left — items are already visible, GSAP adds motion only
      const visible = Math.min(itemCount, 5);
      for (let i = 0; i < visible; i++) {
        tl.from(`#item-${i}`,
          { x: -50, duration: 0.5, ease: "back.out(1.3)" },
          0.3 + i * 0.4
        );
      }

      // Pad timeline to composition duration so every seek() lands in-range
      tl.to({}, { duration: 0.001 }, duration - 0.001);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
