<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=880, height=1100" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 880px; height: 1100px;
        overflow: hidden;
        background: linear-gradient(180deg, #060e1c 0%, #0a1628 100%);
      }
      #root {
        position: relative;
        width: 880px; height: 1100px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 70px 70px;
        gap: 0;
      }
      #start-label {
        font-family: 'Inter', sans-serif;
        font-size: 18px; font-weight: 600;
        letter-spacing: 4px; text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        margin-bottom: 16px;
        opacity: 0;
      }
      #tool-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 110px; font-weight: 900;
        text-transform: uppercase;
        color: #4dabf7;
        letter-spacing: -3px;
        line-height: 1;
        text-shadow: 0 0 60px rgba(77,171,247,0.4);
        opacity: 0;
      }
      #divider {
        width: 60px; height: 4px;
        background: #4dabf7;
        border-radius: 2px;
        margin: 28px 0;
        opacity: 0;
      }
      .step {
        font-family: 'Montserrat', sans-serif;
        font-size: 28px; font-weight: 700;
        color: #ffffff;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
        opacity: 0;
      }
      #glow-ring {
        position: absolute;
        width: 400px; height: 400px;
        border-radius: 50%;
        border: 2px solid rgba(77,171,247,0.15);
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__DURATION__"
      data-width="880"
      data-height="1100"
    >
      <div id="glow-ring"></div>
      <div id="start-label">START WITH</div>
      <div id="tool-name"></div>
      <div id="divider"></div>
    </div>

    <script>
      window.__SECTION_DATA__ = __SECTION_DATA_PLACEHOLDER__;

      const d = window.__SECTION_DATA__;
      const tool = d.tool_mentioned || "AI";
      const steps = d.on_screen_text || [];

      document.getElementById("tool-name").textContent = tool.toUpperCase();

      const root = document.getElementById("root");
      steps.slice(0, 4).forEach((s, i) => {
        const div = document.createElement("div");
        div.className = "step";
        div.id = `step-${i}`;
        div.textContent = s;
        root.appendChild(div);
      });

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.to("#glow-ring", { opacity: 1, scale: 1.2, duration: 1.5, ease: "power2.out" }, 0)
        .to("#start-label", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0.2)
        .fromTo("#tool-name",
          { scale: 1.3, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.7, ease: "back.out(1.4)" },
          0.5
        )
        .to("#divider", { opacity: 1, scaleX: 1, duration: 0.4, ease: "power3.out" }, 1.0);

      steps.slice(0, 4).forEach((_, i) => {
        tl.fromTo(`#step-${i}`,
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
          1.3 + i * 0.5
        );
      });

      // Pulse glow ring at end
      tl.to("#glow-ring", {
        scale: 1.6, opacity: 0, duration: 0.6, ease: "power2.out"
      }, Math.max(2.0, 1.3 + steps.length * 0.5));
      tl.fromTo("#glow-ring",
        { scale: 0.8, opacity: 0 },
        { scale: 1.2, opacity: 0.4, duration: 0.5, ease: "power2.out" },
        Math.max(2.7, 1.3 + steps.length * 0.5 + 0.7)
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
