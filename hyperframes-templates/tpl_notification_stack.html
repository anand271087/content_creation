<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #0d0d14; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .root {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 60px;
    gap: 32px;
  }

  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 40px;
  }

  .notification {
    width: 100%;
    background: rgba(30, 30, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px;
    padding: 36px 40px;
    display: flex;
    align-items: flex-start;
    gap: 28px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateX(120px);
  }

  .notification::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }

  .notif-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    flex-shrink: 0;
  }

  .notif-icon.blue { background: linear-gradient(135deg, #3B82F6, #6366F1); }
  .notif-icon.green { background: linear-gradient(135deg, #10B981, #059669); }
  .notif-icon.orange { background: linear-gradient(135deg, #F59E0B, #EF4444); }

  .notif-content {
    flex: 1;
    min-width: 0;
  }

  .notif-app {
    font-size: 26px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .notif-title {
    font-size: 38px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .notif-body {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
  }

  .notif-time {
    font-size: 26px;
    color: rgba(255,255,255,0.35);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .progress-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #3B82F6;
    position: absolute;
    top: 20px;
    right: 24px;
    opacity: 0;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<div
  id="root"
  class="root clip"
  data-composition-id="notification-stack"
  data-start="0"
  data-width="1080"
  data-height="1920"
  data-duration="__DURATION__"
  data-track-index="0"
>
  <div class="section-label">Automation Running</div>

  <!-- Notification 1 -->
  <div class="notification" id="notif1">
    <div class="notif-icon blue">⚡</div>
    <div class="notif-content">
      <div class="notif-app">__APP_1__</div>
      <div class="notif-title">__TITLE_1__</div>
      <div class="notif-body">__BODY_1__</div>
    </div>
    <div class="notif-time">now</div>
    <div class="progress-dot" id="dot1"></div>
  </div>

  <!-- Notification 2 -->
  <div class="notification" id="notif2">
    <div class="notif-icon green">✅</div>
    <div class="notif-content">
      <div class="notif-app">__APP_2__</div>
      <div class="notif-title">__TITLE_2__</div>
      <div class="notif-body">__BODY_2__</div>
    </div>
    <div class="notif-time">1s ago</div>
    <div class="progress-dot" id="dot2"></div>
  </div>

  <!-- Notification 3 (optional) -->
  <div class="notification" id="notif3">
    <div class="notif-icon orange">🔔</div>
    <div class="notif-content">
      <div class="notif-app">__APP_3__</div>
      <div class="notif-title">__TITLE_3__</div>
      <div class="notif-body">__BODY_3__</div>
    </div>
    <div class="notif-time">2s ago</div>
    <div class="progress-dot" id="dot3"></div>
  </div>
</div>

<script>
(function () {
  window.__timelines = window.__timelines || {};
  var tl = gsap.timeline({ paused: true });

  var delay = 0.2;

  ['#notif1', '#notif2', '#notif3'].forEach(function (sel, i) {
    var el = document.querySelector(sel);
    if (!el) return;
    tl.to(el, {
      opacity: 1,
      x: 0,
      duration: 0.45,
      ease: 'expo.out'
    }, delay + i * 0.4);

    var dot = document.querySelector('#dot' + (i + 1));
    if (dot) {
      tl.to(dot, { opacity: 1, duration: 0.15 }, delay + i * 0.4 + 0.1);
      tl.to(dot, { opacity: 0, duration: 0.3, delay: 0.5 }, delay + i * 0.4 + 0.3);
    }
  });

  // Subtle settle: all notifs breathe together
  tl.to('.notification', {
    boxShadow: '0 12px 60px rgba(59,130,246,0.15), 0 8px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08)',
    duration: 0.8,
    ease: 'sine.inOut'
  }, '+=0.3');

  window.__timelines['notification-stack'] = tl;
})();
</script>
</body>
</html>
