<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #07070f; font-family: 'Montserrat', sans-serif; }

  .root {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
  }

  /* Radial ambient glow behind center */
  .ambient {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
  }

  /* SVG for connection lines — sits behind all nodes */
  .connections-svg {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
    pointer-events: none;
  }

  .conn-line {
    stroke: rgba(139,92,246,0.3);
    stroke-width: 2;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    fill: none;
  }

  /* Title */
  .graph-title {
    position: absolute;
    top: 80px;
    left: 0; right: 0;
    text-align: center;
    font-size: 44px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(-15px);
  }

  /* Footer tagline */
  .graph-footer {
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    text-align: center;
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    opacity: 0;
  }

  /* ── Center Node ── */
  .center-node {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 2.5px solid rgba(139,92,246,0.7);
    background: radial-gradient(circle at 40% 35%, #1e1b4b, #0f0f1f);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    opacity: 0;
    box-shadow: 0 0 0px rgba(139,92,246,0.5);
    z-index: 10;
  }
  .center-icon { font-size: 52px; }
  .center-label {
    font-size: 26px;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    padding: 0 16px;
  }

  /* ── Satellite Nodes ── */
  .satellite {
    position: absolute;
    background: #111827;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    opacity: 0;
    transform: scale(0.7);
    z-index: 10;
    min-width: 170px;
    max-width: 220px;
  }

  .sat-icon { font-size: 36px; }
  .sat-label {
    font-size: 25px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
  }
  .sat-sub {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    line-height: 1.2;
  }

  /* Color variants per satellite slot */
  .sat-0 { border-color: rgba(99,102,241,0.5); }
  .sat-1 { border-color: rgba(16,185,129,0.5); }
  .sat-2 { border-color: rgba(245,158,11,0.5); }
  .sat-3 { border-color: rgba(239,68,68,0.5); }
  .sat-4 { border-color: rgba(59,130,246,0.5); }
  .sat-5 { border-color: rgba(168,85,247,0.5); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<div
  id="root"
  class="root clip"
  data-composition-id="knowledge-graph"
  data-start="0"
  data-width="1080"
  data-height="1920"
  data-duration="__DURATION__"
  data-track-index="0"
>
  <!-- Ambient glow -->
  <div class="ambient" id="ambient"></div>

  <!-- SVG connection lines (drawn by GSAP) -->
  <svg class="connections-svg" id="connSvg">
    <!-- Lines injected here by generator or drawn by JS from satellite positions -->
    __CONN_LINES_SVG__
  </svg>

  <!-- Title -->
  <div class="graph-title" id="graphTitle">__GRAPH_TITLE__</div>

  <!-- Center node -->
  <div class="center-node" id="centerNode">
    <div class="center-icon">__CENTER_ICON__</div>
    <div class="center-label">__CENTER_LABEL__</div>
  </div>

  <!-- Satellite nodes — positioned absolutely via inline style, injected by generator -->
  __SATELLITES_HTML__

  <!-- Footer -->
  <div class="graph-footer" id="graphFooter">__GRAPH_FOOTER__</div>
</div>

<script>
(function () {
  window.__timelines = window.__timelines || {};
  var tl = gsap.timeline({ paused: true });

  var CX = 540;   // center X of canvas
  var CY = 960;   // center Y of canvas

  // Ambient glow
  tl.to('#ambient', { opacity: 1, duration: 0.8, ease: 'sine.inOut' }, 0);

  // Title
  tl.to('#graphTitle', { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 0.2);

  // Center node bursts in
  tl.to('#centerNode', {
    opacity: 1,
    scale: 1,
    duration: 0.6,
    ease: 'elastic.out(1, 0.4)'
  }, 0.5);

  // Center glow pulse (ongoing)
  tl.to('#centerNode', {
    boxShadow: '0 0 80px rgba(139,92,246,0.6)',
    duration: 1.0,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1
  }, 1.0);

  // Satellites and lines
  var satellites = document.querySelectorAll('.satellite');
  var lines = document.querySelectorAll('.conn-line');

  satellites.forEach(function (sat, i) {
    var t = 1.0 + i * 0.4;

    // Line draws from center outward
    if (lines[i]) {
      tl.to(lines[i], { strokeDashoffset: 0, duration: 0.35, ease: 'power2.out' }, t);
    }

    // Satellite pops in
    tl.to(sat, {
      opacity: 1,
      scale: 1,
      duration: 0.4,
      ease: 'back.out(1.7)'
    }, t + 0.2);
  });

  // Footer
  tl.to('#graphFooter', { opacity: 1, duration: 0.5, ease: 'sine.inOut' }, '+=0.3');

  // Subtle ambient breathe
  tl.to('#ambient', {
    width: '650px',
    height: '650px',
    duration: 2.0,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1
  }, 1.5);

  window.__timelines['knowledge-graph'] = tl;
})();
</script>
</body>
</html>
